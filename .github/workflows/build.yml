name: Build WalletTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          find . -maxdepth 1 \( -name "*.png" -o -name "*.jpg" -o -name "*.webp" -o -name "*.svg" \) ! -path "./.git/*" -exec cp {} www/ \; 2>/dev/null || true

      - name: Initialize Capacitor
        run: npx cap init WalletTrack com.wallettrack.app --web-dir www

      - name: Remove existing android folder if present
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: 🔔 Generar iconos HD (mejorado, portado de RiderTrack/FitTrack)
        run: |
          if [ -f "icon.png" ]; then
            echo "📐 Tamaño del icon.png original:"
            identify icon.png

            # Iconos launcher nítidos con Lanczos + unsharp
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              case $density in
                mdpi)    size=48  ;;
                hdpi)    size=72  ;;
                xhdpi)   size=96  ;;
                xxhdpi)  size=144 ;;
                xxxhdpi) size=192 ;;
              esac
              dir="android/app/src/main/res/mipmap-${density}"
              mkdir -p "$dir"
              convert icon.png -resize ${size}x${size}\! -filter Lanczos -quality 100 -unsharp 0x0.5 "${dir}/ic_launcher.png"
              convert icon.png -resize ${size}x${size}\! -filter Lanczos -quality 100 -unsharp 0x0.5 "${dir}/ic_launcher_round.png"
              echo "  ✅ ${density}: ${size}x${size}"
            done

            # Foreground para adaptive icons (Android 8+)
            # El foreground es 108dp con el logo centrado al 70% (zona segura)
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              case $density in
                mdpi)    fg=108 ;;
                hdpi)    fg=162 ;;
                xhdpi)   fg=216 ;;
                xxhdpi)  fg=324 ;;
                xxxhdpi) fg=432 ;;
              esac
              dir="android/app/src/main/res/mipmap-${density}"
              convert icon.png -resize $((fg*70/100))x$((fg*70/100)) -filter Lanczos -quality 100 -unsharp 0x0.5 -gravity center -background none -extent ${fg}x${fg} "${dir}/ic_launcher_foreground.png"
            done

            # Adaptive icons XML (Android 8+)
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

            # Fondo del adaptive icon: negro (combina con el verde neón del logo)
            mkdir -p android/app/src/main/res/values
            rm -f android/app/src/main/res/values/ic_launcher_background.xml
            rm -f android/app/src/main/res/values/colors.xml
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#000000</color>\n</resources>' > android/app/src/main/res/values/colors.xml

            echo "✅ Todos los iconos generados en HD con unsharp mask"
          else
            echo "⚠️ No hay icon.png, usando iconos default"
          fi

      - name: Update AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <application|' "$MANIFEST"

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias wallettrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass wallettrack123 \
            -keypass wallettrack123 \
            -dname "CN=WalletTrack, OU=Dev, O=WalletTrack, L=Lima, S=Lima, C=PE"

      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -v -p 4 android/app/build/outputs/apk/debug/app-debug.apk WalletTrack-aligned.apk

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          $APKSIGNER sign --ks debug.keystore --ks-key-alias wallettrack --ks-pass pass:wallettrack123 --key-pass pass:wallettrack123 --out WalletTrack-v1.0.apk WalletTrack-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: WalletTrack-APK
          path: WalletTrack-v1.0.apk
          retention-days: 30

      - name: Show APK info
        run: du -sh WalletTrack-v1.0.apk
